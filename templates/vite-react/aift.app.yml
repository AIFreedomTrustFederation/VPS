name: aift-vite-react-template
repo: https://github.com/AIFreedomTrustFederation/aift-launch-test
domain: test.aifreedomtrust.com
branch: main
framework: vite
build:
  install: npm ci
  command: npm run build
  output: dist
runtime:
  type: static
  port: 3000
  healthcheck: /
env:
  NODE_ENV: production
preview:
  enabled: true
  domain_pattern: "{branch}.preview.aifreedomtrust.com"

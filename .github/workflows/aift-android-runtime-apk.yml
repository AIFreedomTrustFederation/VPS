name: Build AIFT Android Runtime APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android/aift-cloud-runtime/**'
      - 'scripts/aift-android-runtime-bootstrap.sh'
      - '.github/workflows/aift-android-runtime-apk.yml'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bootstrap Gradle files
        run: bash scripts/aift-android-runtime-bootstrap.sh

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Build debug APK
        working-directory: android/aift-cloud-runtime
        run: gradle assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: aift-cloud-runtime-debug-apk
          path: android/aift-cloud-runtime/app/build/outputs/apk/debug/app-debug.apk

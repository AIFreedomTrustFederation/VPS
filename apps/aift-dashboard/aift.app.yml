name: aift-dashboard
repo: https://github.com/AIFreedomTrustFederation/VPS
domain: vps.aifreedomtrust.com
branch: main
framework: nextjs
build:
  install: npm ci
  command: npm run build
  start: npm start
runtime:
  type: node
  port: 3000
  healthcheck: /api/status
env:
  NODE_ENV: production
preview:
  enabled: true
  domain_pattern: "{branch}.preview.aifreedomtrust.com"
